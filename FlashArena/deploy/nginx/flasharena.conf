# FlashArena 리버스 프록시 (방식 B: 프론트 + API 를 같은 origin 으로 묶음)
#
# 한 도메인에서:
#   /        → 빌드된 정적 프론트 파일 (Vite dist)
#   /api/    → 백엔드(Spring Boot :8092) 로 프록시
#
# 같은 origin 이므로 CORS 가 필요 없고, SSE 는 버퍼링만 끄면 실시간으로 흐른다.
# TLS(443) 종단은 이 nginx 또는 그 앞단(로드밸런서/Cloudflare)에서 처리한다고 가정.

upstream flasharena_backend {
    server 127.0.0.1:8092;
    keepalive 32;
}

server {
    listen 80;
    server_name flasharena.example.com;   # ← 실제 도메인으로 교체

    # --- 정적 프론트 (Vite build 결과물) ---
    root /var/www/flasharena;              # ← dist/ 를 업로드한 경로로 교체
    index index.html;

    # SPA 라우팅: 파일이 없으면 index.html 로 폴백.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- SSE 전용: 시뮬레이션 로그 스트림 ---
    # 핵심은 buffering off + 긴 read timeout. 안 그러면 이벤트가 뭉쳐서 늦게 온다.
    location /api/simulator/stream/ {
        proxy_pass http://flasharena_backend;
        proxy_http_version 1.1;

        proxy_buffering off;               # ★ SSE 실시간성의 핵심
        proxy_cache off;
        gzip off;                          # 압축이 플러시를 막지 않도록
        chunked_transfer_encoding on;

        proxy_set_header Connection '';    # keep-alive 유지(HTTP/1.1)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 1h;             # 긴 run 동안 연결 유지(emitter 타임아웃 5분보다 넉넉히)
        proxy_send_timeout 1h;
    }

    # --- 일반 REST API ---
    location /api/ {
        proxy_pass http://flasharena_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }
}