spring:
  datasource:
    url: ${DB_URL}                    # jdbc:postgresql://<rds-endpoint>:5432/hauly
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}          # AWS Secrets Manager → ECS task env (fallback 없음)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false        # prod 는 baseline 강제 금지

server:
  port: 8080

hauly:
  s3:
    bucket: ${S3_BUCKET}
    region: ${AWS_REGION:ap-northeast-2}
  jwt:
    secret: ${JWT_SECRET}            # Secrets Manager 필수, 32 자 이상, fallback 없음
    access-ttl-min: 30
    refresh-ttl-day: 14
  security:
    cors:
      allowed-origins: ${HAULY_CORS_ALLOWED_ORIGINS}  # 예: https://admin.hauly.com,https://shop.hauly.com
    cookie:
      secure: true
