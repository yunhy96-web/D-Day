spring:
  datasource:
    url: ${DB_URL}                    # jdbc:postgresql://<rds-endpoint>:5432/hauly
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}          # AWS Secrets Manager → ECS task env (fallback 없음)
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true        # dev 는 초기화 편의상 허용

server:
  port: 8080

hauly:
  s3:
    bucket: ${S3_BUCKET}
    region: ${AWS_REGION:ap-northeast-2}
  jwt:
    secret: ${JWT_SECRET}            # Secrets Manager 필수, fallback 없음
    access-ttl-min: 30
    refresh-ttl-day: 14
