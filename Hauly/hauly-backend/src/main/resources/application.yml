spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: hauly
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 8MB        # client compresses >5MB; allow some slack for HEIC etc.
      max-request-size: 12MB

management:
  endpoints:
    web:
      exposure:
        include: health, info   # prod 는 IAM 으로 추가 보호
  endpoint:
    health:
      probes:
        enabled: true

hauly:
  security:
    cors:
      allowed-origins: ""   # comma-separated; override in profile-specific yml (local/prod)
